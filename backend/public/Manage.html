<!doctype html>
<html lang="th">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Teacher Dashboard - Fingerprint Attendance</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body class="manage-page">
    <header>
        <div class="brand">
            <div class="logo">FA</div>
            <div>
                <h1>Fingerprint Attendance System</h1>
            </div>
        </div>

        <div class="header-right">
            <span id="user-display" class="muted"></span>
            <button class="btn secondary" id="btn-logout">Logout</button>
        </div>
    </header>

    <main>
        <div class="card">
            <div class="row head" style="justify-content: space-between; margin-bottom: 16px;">
                <h2 style="margin:0">Manage Students</h2>
                <div class="row actions">
                    <button class="btn secondary"
                        onclick="location.href='teacher.html?subject_id=' + new URLSearchParams(window.location.search).get('subject_id')">Back</button>
                    <button class="btn" onclick="openAddStudent()">+ Add Student</button>
                </div>
            </div>
            <div id="students-table"></div>
        </div>
    </main>

    <!-- modal -->
    <div class="modal-backdrop" id="modal-backdrop">
        <div class="modal" id="modal"></div>
    </div>

    <script src="app.js"></script>
</body>

</html>
